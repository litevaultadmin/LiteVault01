<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiteVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { 
      background: linear-gradient(145deg, #0a0a0a, #111827, #1e2937); 
      min-height: 100vh;
    }
    .liquid-glass {
      background: rgba(255, 255, 255, 0.09);
      backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        inset 0 2px 0 rgba(255, 255, 255, 0.4),
        inset 0 -2px 0 rgba(255, 255, 255, 0.1),
        0 0 30px rgba(165, 243, 252, 0.3);
    }
    .nav-glass {
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    .nav-btn {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      transition: all 0.3s ease;
    }
    .nav-btn:hover {
      background: rgba(165, 243, 252, 0.25);
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 10px 20px rgba(165, 243, 252, 0.3);
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center gap-10 py-12">

  <!-- LiteVault Title - Enhanced Liquid Glass -->
  <div class="liquid-glass px-32 py-8 rounded-[2.5rem] text-center">
    <h1 class="text-8xl font-bold tracking-[-3px] text-white">LiteVault</h1>
  </div>

  <!-- Navigation Row - Liquid Glass -->
  <div class="nav-glass flex flex-wrap gap-3 justify-center px-10 py-4 rounded-3xl">
    <a href="#" class="nav-btn text-white px-7 py-3 rounded-2xl text-lg font-medium">Buy</a>
    <a href="#" class="nav-btn text-white px-7 py-3 rounded-2xl text-lg font-medium">Earn</a>
    <a href="#" class="nav-btn text-white px-7 py-3 rounded-2xl text-lg font-medium">Mine</a>
    <a href="#" class="nav-btn text-white px-7 py-3 rounded-2xl text-lg font-medium">Mint</a>
    <a href="#" class="nav-btn text-white px-7 py-3 rounded-2xl text-lg font-medium">News</a>
    <a href="#" class="nav-btn text-white px-7 py-3 rounded-2xl text-lg font-medium">Forum</a>
    <a href="#" class="nav-btn text-white px-7 py-3 rounded-2xl text-lg font-medium">Donate</a>
  </div>

  <!-- TradingView Chart - Heavy Liquid Glass Frame -->
  <div class="liquid-glass w-full max-w-6xl mx-auto rounded-[2.5rem] overflow-hidden shadow-2xl" style="height: 590px;">
    <div class="tradingview-widget-container" style="height:100%; width:100%">
      <div id="tradingview_chart" style="height:100%; width:100%"></div>
    </div>
  </div>

  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
  <script type="text/javascript">
  new TradingView.widget({
    "container_id": "tradingview_chart",
    "width": "100%",
    "height": "100%",
    "symbol": "CRYPTO:LTCUSD",
    "interval": "D",
    "timezone": "Etc/UTC",
    "theme": "dark",
    "style": "1",
    "locale": "en",
    "toolbar_bg": "#0a0a0a",
    "enable_publishing": false,
    "hide_side_toolbar": false,
    "allow_symbol_change": true
  });
  </script>

</body>
</html>
