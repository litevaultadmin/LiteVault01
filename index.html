<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiteVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0a0a0a, #1a1a2e); }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(32px); border: 1px solid rgba(255,255,255,0.18); box-shadow: 0 15px 50px rgba(0,0,0,0.6); }
    .header-glass { background: rgba(255,255,255,0.13); backdrop-filter: blur(36px); box-shadow: 0 0 65px rgba(165,243,252,0.45); }
    .tab-active { background: rgba(165,243,252,0.3); color: white; border-bottom: 3px solid #67e8f9; }
  </style>
</head>
<body class="min-h-screen text-white">

  <!-- LiteVault Header -->
  <div class="header-glass px-28 py-7 rounded-3xl mx-auto mt-8 text-center max-w-md">
    <h1 class="text-7xl font-bold tracking-[-2px]">LiteVault</h1>
  </div>

  <!-- Navigation -->
  <div class="glass flex justify-center gap-2 mx-auto mt-8 px-6 py-3 rounded-3xl max-w-3xl flex-wrap">
    <button onclick="switchTab(0)" class="tab px-6 py-2 rounded-xl tab-active">Buy</button>
    <button onclick="switchTab(1)" class="tab px-6 py-2 rounded-xl">Earn</button>
    <button onclick="switchTab(2)" class="tab px-6 py-2 rounded-xl">Mine</button>
    <button onclick="switchTab(3)" class="tab px-6 py-2 rounded-xl">Mint</button>
    <button onclick="switchTab(4)" class="tab px-6 py-2 rounded-xl">News</button>
    <button onclick="switchTab(5)" class="tab px-6 py-2 rounded-xl">Forum</button>
    <button onclick="switchTab(6)" class="tab px-6 py-2 rounded-xl">Donate</button>
  </div>

  <!-- Content -->
  <div id="content" class="max-w-6xl mx-auto mt-8 px-4">
    <!-- Home / Chart -->
    <div id="tab0" class="tab-content">
      <div class="glass rounded-3xl overflow-hidden" style="height: 580px;">
        <div class="tradingview-widget-container" style="height:100%; width:100%">
          <div id="tradingview_chart" style="height:100%; width:100%"></div>
        </div>
      </div>
    </div>

    <!-- News / Media Page with two tiles -->
<!-- X Live Feed Tile -->
<div class="glass rounded-3xl p-5">
  <h2 class="text-lg font-semibold mb-3">🔴 Live X • Litecoin / LTC Mentions</h2>
  <a class="twitter-timeline" 
     href="https://twitter.com/search?q=LTC%20OR%20Litecoin%20OR%20%23LTC%20OR%20%23Litecoin&src=typed_query" 
     data-theme="dark" 
     data-height="420" 
     data-chrome="noheader nofooter noborders">Litecoin mentions on X</a>
  <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>
</div>

      <!-- Your RSS News Widget Tile -->
      <div class="glass rounded-3xl p-5">
        <h2 class="text-lg font-semibold mb-3">Live Articles & News • Litecoin</h2>
        <rssapp-wall id="tI7fIEv1TvlxzLKj"></rssapp-wall>
        <script src="https://widget.rss.app/v1/wall.js" type="text/javascript" async></script>
      </div>
    </div>

    <!-- Other tabs placeholders -->
    <div id="tab1" class="tab-content hidden text-center py-20 text-xl">Earn coming soon...</div>
    <div id="tab2" class="tab-content hidden text-center py-20 text-xl">Mine coming soon...</div>
    <div id="tab3" class="tab-content hidden text-center py-20 text-xl">Mint coming soon...</div>
    <div id="tab5" class="tab-content hidden text-center py-20 text-xl">Forum coming soon...</div>
    <div id="tab6" class="tab-content hidden text-center py-20 text-xl">Donate coming soon...</div>
  </div>

  <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
  <script>
  function switchTab(n) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
    document.getElementById('tab' + n).classList.remove('hidden');
    document.querySelectorAll('.tab').forEach((el, i) => {
      if (i === n) el.classList.add('tab-active');
      else el.classList.remove('tab-active');
    });
  }

  // Load TradingView chart
  new TradingView.widget({
    "container_id": "tradingview_chart",
    "width": "100%",
    "height": "100%",
    "symbol": "CRYPTO:LTCUSD",
    "interval": "D",
    "theme": "dark",
    "style": "1",
    "locale": "en"
  });
  </script>

</body>
</html>
