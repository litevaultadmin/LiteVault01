<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiteVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0a0a0a, #1a1a2e); }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(28px); border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
    .header-glass { background: rgba(255,255,255,0.12); backdrop-filter: blur(32px); box-shadow: 0 0 60px rgba(165,243,252,0.4); }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center gap-12">

  <div class="header-glass px-28 py-9 rounded-3xl text-center">
    <h1 class="text-8xl font-bold tracking-[-2px] text-white">LiteVault</h1>
  </div>

  <div class="glass w-full max-w-6xl mx-auto rounded-3xl overflow-hidden" style="height: 620px;">
    <!-- TradingView Full Interactive Chart (best in class) -->
    <div class="tradingview-widget-container" style="height:100%;width:100%">
      <div id="tradingview-widget" style="height:100%;width:100%"></div>
    </div>
    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js" async>
    {
      "symbol": "CRYPTO:LTCUSD",
      "interval": "D",
      "theme": "dark",
      "style": "1",
      "locale": "en",
      "toolbar_bg": "#0a0a0a",
      "enable_publishing": false,
      "hide_side_toolbar": false,
      "allow_symbol_change": true,
      "studies": ["RSI@tv-basicstudies", "MACD@tv-basicstudies"],
      "container_id": "tradingview-widget"
    }
    </script>
  </div>

</body>
</html>
