<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiteVault</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://widgets.coingecko.com/gecko-coin-price-chart-widget.js"></script>
  <style>
    body { background: linear-gradient(135deg, #0a0a0a, #1a1a2e); }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(28px); border: 1px solid rgba(255,255,255,0.12); box-shadow: 0 10px 50px rgba(0,0,0,0.6); }
    .header-glass { background: rgba(255,255,255,0.12); backdrop-filter: blur(32px); box-shadow: 0 0 60px rgba(165,243,252,0.4); }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center gap-12">

  <div class="header-glass px-28 py-9 rounded-3xl text-center">
    <h1 class="text-8xl font-bold tracking-[-2px] text-white">LiteVault</h1>
  </div>

  <div class="glass w-full max-w-6xl mx-auto rounded-3xl overflow-hidden" style="height: 620px;">
    <gecko-coin-price-chart-widget 
      locale="en" 
      dark-mode="true" 
      outlined="true" 
      coin-id="litecoin" 
      initial-currency="usd" 
      width="100" 
      height="590">
    </gecko-coin-price-chart-widget>
  </div>

</body>
</html>
